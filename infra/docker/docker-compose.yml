services:
  postgres:
    image: postgres:16
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minio} ${AWS_SECRET_ACCESS_KEY:-minio123} &&
      mc mb --ignore-existing local/${S3_BUCKET:-lakehouse} &&
      mc anonymous set private local/${S3_BUCKET:-lakehouse}
      "

  kafka:
    image: bitnami/kafka:3.7
    container_name: lakehouse-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  hive-metastore:
    image: bitsondatadev/hive-metastore:3.1.2
    container_name: lakehouse-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${POSTGRES_METASTORE_DB:-metastore}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER:-postgres}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD:-postgres}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE:-true}
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:460
    container_name: lakehouse-trino
    depends_on:
      - hive-metastore
    ports:
      - "8081:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog

  spark:
    build:
      context: ../..
      dockerfile: infra/docker/spark/Dockerfile
    container_name: lakehouse-spark
    depends_on:
      - minio
      - hive-metastore
      - kafka
    environment: &lakehouse-env
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-lakehouse}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-thrift://hive-metastore:9083}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SPARK_MASTER: ${SPARK_MASTER:-local[*]}
      SPARK_TIMEZONE: ${SPARK_TIMEZONE:-UTC}
      LATE_ARRIVAL_WATERMARK_DAYS: ${LATE_ARRIVAL_WATERMARK_DAYS:-45}
      GOLD_LOOKBACK_DAYS: ${GOLD_LOOKBACK_DAYS:-60}
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8081}
      TRINO_CATALOG: ${TRINO_CATALOG:-delta_lake}
      TRINO_SCHEMA: ${TRINO_SCHEMA:-gold}
    volumes:
      - ../..:/opt/project
    command: sleep infinity

  airflow-init:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment: &airflow-env
      <<: *lakehouse-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/${POSTGRES_AIRFLOW_DB:-airflow}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__WEBSERVER__SECRET_KEY: lakehouse-secret
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      PYTHONPATH: /opt/project
    volumes:
      - ../..:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command: >
      -lc "
      airflow db migrate &&
      airflow users create
      --role Admin
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Data
      --lastname Engineer
      --email admin@example.com || true
      "

  airflow-webserver:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    container_name: lakehouse-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ../..:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/airflow/Dockerfile
    container_name: lakehouse-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ../..:/opt/project
      - airflow-logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler

volumes:
  postgres-data:
  minio-data:
  airflow-logs:

